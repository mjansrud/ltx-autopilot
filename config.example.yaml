# ─────────────────────────────────────────────────────────────
#  LTX Autopilot — Continuous Self-Learning Pipeline Config
# ─────────────────────────────────────────────────────────────

# Path to the cloned LTX-2 trainer package
ltx_trainer_dir: "./LTX-2/packages/ltx-trainer"

# Where to store persistent state (seen URLs, batch counter, etc.)
state_file: "./state/pipeline_state.json"

# ── Crawling (via Lustpress search engine) ──────────────────
crawler:
  # Lustpress server config — started automatically
  lustpress_dir: "./lustpress"
  lustpress_port: 3000

  # Which sites to search (lustpress sources)
  sources:
    - "xvideos"
    - "xnxx"
    - "eporner"
    - "redtube"
    - "youporn"

  # Rotate through these search queries each batch — diverse content
  search_queries:
    - "hd couple sex"
    - "pov blowjob hd"
    - "striptease undressing hd"
    - "solo masturbation hd"
    - "doggystyle hd"
    - "cowgirl riding pov"
    - "missionary passionate hd"
    - "lesbian hd"
    - "sensual massage"
    - "creampie hd"
    - "reverse cowgirl pov"
    - "69 oral hd"
    - "shower sex hd"
    - "lingerie tease solo"
    - "anal hd"
    - "threesome hd"
    - "handjob cumshot hd"
    - "milf hd"
    - "petite teen hd"
    - "interracial hd"

  max_videos_per_batch: 8
  min_duration_sec: 5
  max_duration_sec: 900        # up to 15min clips (scene splitter handles segmenting)
  max_resolution: 720          # 720p min for quality
  download_archive: "./state/seen_videos.txt"
  include_random: true

# ── Captioning (local multimodal model) ─────────────────────
captioner:
  # "transformers"   → load any HF multimodal model directly
  # "openai_compat"  → any OpenAI-compatible server (vLLM, Ollama)
  backend: "transformers"

  # Local path or HuggingFace model ID
  model_id: "./models/Qwen2.5-VL-7B-Instruct-abliterated"

  # For openai_compat backend:
  # api_base: "http://localhost:8080/v1"
  # model_name: "gemma-4-31b-it-abliterated"

  dtype: "bfloat16"
  load_in_8bit: false
  load_in_4bit: false           # RTX 5090 32GB — bf16 fits fine, faster than quant
  fps: 2                       # frames per second to sample from video
  max_frames: 16               # cap per video (lower to prevent VRAM OOM)
  include_audio: false          # VL model doesn't support audio; Omni model does
  max_new_tokens: 1536         # long captions for LTX 2.3

  # null = use built-in LTX 2.3 structured format prompt
  instruction: null

# ── Scene Splitting ─────────────────────────────────────────
scene_split:
  enabled: false               # TODO: enable once PySceneDetect is in LTX venv
  min_scene_duration: "5s"    # LTX recommends 5s minimum
  detector: "content"          # content | adaptive | threshold

# ── Preprocessing ───────────────────────────────────────────
preprocessing:
  # LTX 2.3 requirements: dimensions must be multiples of 32, frames % 8 == 1
  # Multiple buckets require batch_size=1
  resolution_buckets:
    - "768x448x89"             # high-detail (3.5s at 25fps)
    - "576x576x49"             # balanced square (2s at 25fps)
    - "960x544x49"             # widescreen (2s at 25fps)
  with_audio: false             # disabled: n_mels config missing in LTX audio pipeline

# ── Training ────────────────────────────────────────────────
training:
  # Base model paths — using ComfyUI's existing models
  model_checkpoint: "C:/Users/morte/Projects/playground/ComfyUI_Portable/ComfyUI/models/diffusion_models/ltx2/ltx-2.3-22b-dev_transformer_only_bf16.safetensors"
  text_encoder: "./models/gemma-3-12b-it"

  mode: "lora"
  output_dir: "./checkpoints"

  # LoRA config
  lora:
    rank: 32
    alpha: 32
    target_modules: ["to_k", "to_q", "to_v", "to_out.0"]

  # Optimizer
  learning_rate: 1.0e-4
  optimizer: "adamw_8bit"
  lr_scheduler: "cosine"
  warmup_steps: 100

  # Per-batch training
  steps_per_batch: 500
  batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true

  mixed_precision: "bf16"
  quantize: "int8"

  # Checkpointing
  save_every_n_steps: 250

  # Resume from latest checkpoint automatically
  auto_resume: true

# ── Evaluation (test the LoRA) ──────────────────────────────
evaluation:
  # Generate test videos every N training steps
  every_n_steps: 250

  # Test prompts — customize for your use case
  prompts:
    - "A woman with long dark hair walks slowly through a sunlit room, soft natural lighting from a window"
    - "Close-up of a person's hands gently touching silk fabric, shallow depth of field"
    - "Two people sitting close together on a couch, warm ambient lighting, cinematic composition"
    - "A figure silhouetted against a sunset, slow camera pan, golden hour lighting"

  # Generation settings
  height: 576
  width: 576
  num_frames: 49
  fps: 25
  guidance_scale: 4.0
  num_inference_steps: 40

  # Save generated videos here
  output_dir: "./evaluations"

  # Compare LoRA vs base model (no LoRA) every N batches
  compare_base_every_n_batches: 5

# ── Cleanup ─────────────────────────────────────────────────
cleanup:
  delete_after_training: true
  keep_metadata: true          # archive caption JSONLs

# ── VRAM Management ─────────────────────────────────────────
vram:
  aggressive_cleanup: true
  log_usage: true
